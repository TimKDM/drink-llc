<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Blog: Hydration science / recovery tips content image -->
  <rect width="800" height="450" fill="#F5F7F2"/>

  <!-- Background grid pattern — scientific/clean feel -->
  <line x1="100" y1="0" x2="100" y2="450" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="0" x2="300" y2="450" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="500" y1="0" x2="500" y2="450" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="0" x2="700" y2="450" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="75" x2="800" y2="75" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="225" x2="800" y2="225" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="375" x2="800" y2="375" stroke="#D4DED0" stroke-width="0.5" opacity="0.3"/>

  <!-- Hydration curve / performance chart -->
  <path d="M120 350 Q200 340 280 280 Q360 220 440 200 Q520 180 600 160 Q660 150 700 145" stroke="#7CB518" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Area under curve -->
  <path d="M120 350 Q200 340 280 280 Q360 220 440 200 Q520 180 600 160 Q660 150 700 145 L700 350z" fill="#7CB518" opacity="0.06"/>

  <!-- Data points on curve -->
  <circle cx="200" cy="335" r="5" fill="#7CB518"/>
  <circle cx="350" cy="240" r="5" fill="#7CB518"/>
  <circle cx="500" cy="190" r="5" fill="#FF8C42"/>
  <circle cx="650" cy="152" r="5" fill="#7CB518"/>

  <!-- Labels -->
  <text x="200" y="365" font-family="sans-serif" font-size="9" fill="#6B7B6E" text-anchor="middle">Dehydrated</text>
  <text x="350" y="268" font-family="sans-serif" font-size="9" fill="#6B7B6E" text-anchor="middle">Hydrating</text>
  <text x="500" y="178" font-family="sans-serif" font-size="9" font-weight="600" fill="#FF8C42" text-anchor="middle">Peak</text>
  <text x="650" y="140" font-family="sans-serif" font-size="9" fill="#6B7B6E" text-anchor="middle">Sustained</text>

  <!-- Y-axis label -->
  <text x="60" y="230" font-family="sans-serif" font-size="10" fill="#6B7B6E" text-anchor="middle" transform="rotate(-90 60 230)" letter-spacing="0.1em">PERFORMANCE</text>

  <!-- X-axis label -->
  <text x="400" y="430" font-family="sans-serif" font-size="10" fill="#6B7B6E" text-anchor="middle" letter-spacing="0.1em">HYDRATION LEVEL</text>

  <!-- Water drop icon top left -->
  <path d="M70 50 L80 68 C84 74 76 80 70 74 C64 80 56 74 60 68z" fill="#7CB518" opacity="0.3"/>

  <!-- Title area -->
  <text x="400" y="55" font-family="sans-serif" font-size="16" font-weight="700" fill="#1A1A1A" text-anchor="middle" letter-spacing="0.05em">The Science of Hydration</text>
</svg>
