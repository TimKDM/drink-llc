<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Collection: Drink product lineup — hydration mixes & recovery blends -->
  <rect width="1200" height="500" fill="#F0F5E8"/>

  <!-- Surface -->
  <rect y="350" width="1200" height="150" fill="#E8F0DC"/>
  <line x1="0" y1="350" x2="1200" y2="350" stroke="#D4DED0" stroke-width="1.5"/>

  <!-- Bottle 1: Hydration Mix -->
  <rect x="100" y="120" width="70" height="230" rx="12" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="110" y="110" width="50" height="20" rx="5" fill="#7CB518"/>
  <circle cx="135" cy="200" r="4" fill="#7CB518" opacity="0.4"/>
  <circle cx="125" cy="215" r="3" fill="#7CB518" opacity="0.3"/>
  <circle cx="145" cy="210" r="3.5" fill="#7CB518" opacity="0.35"/>
  <rect x="112" y="245" width="46" height="30" rx="3" fill="#7CB518" opacity="0.1"/>
  <text x="135" y="263" font-family="sans-serif" font-size="7" font-weight="600" fill="#5A9A10" text-anchor="middle">HYDRATE</text>
  <text x="135" y="275" font-family="sans-serif" font-size="5.5" fill="#6B7B6E" text-anchor="middle">Electrolyte Mix</text>

  <!-- Pouch 2: Recovery Blend -->
  <path d="M290 150 Q330 125 370 150 L378 350 L282 350z" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="298" y="220" width="64" height="30" rx="3" fill="#FF8C42" opacity="0.12"/>
  <text x="330" y="238" font-family="sans-serif" font-size="7" font-weight="600" fill="#D4732E" text-anchor="middle">RECOVER</text>
  <text x="330" y="250" font-family="sans-serif" font-size="5.5" fill="#6B7B6E" text-anchor="middle">Post-Workout</text>

  <!-- Can 3: Energy drink -->
  <rect x="470" y="140" width="60" height="210" rx="14" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="475" y="200" width="50" height="55" rx="4" fill="#FFE566" opacity="0.15"/>
  <text x="500" y="230" font-family="sans-serif" font-size="7" font-weight="600" fill="#B8A030" text-anchor="middle">BOOST</text>
  <text x="500" y="242" font-family="sans-serif" font-size="5.5" fill="#6B7B6E" text-anchor="middle">Natural Energy</text>

  <!-- Bottle 4: Matcha Recovery -->
  <rect x="630" y="130" width="65" height="220" rx="10" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="638" y="120" width="49" height="18" rx="4" fill="#5A9A10"/>
  <rect x="640" y="220" width="45" height="30" rx="3" fill="#7CB518" opacity="0.1"/>
  <text x="662" y="238" font-family="sans-serif" font-size="6.5" font-weight="600" fill="#5A9A10" text-anchor="middle">MATCHA</text>
  <text x="662" y="250" font-family="sans-serif" font-size="5.5" fill="#6B7B6E" text-anchor="middle">Recovery</text>

  <!-- Stick packs 5: On-the-go -->
  <rect x="800" y="180" width="20" height="170" rx="4" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1"/>
  <rect x="825" y="170" width="20" height="180" rx="4" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1"/>
  <rect x="850" y="185" width="20" height="165" rx="4" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1"/>
  <rect x="803" y="260" width="14" height="20" rx="2" fill="#FF9EBA" opacity="0.2"/>
  <rect x="828" y="250" width="14" height="20" rx="2" fill="#7CB518" opacity="0.15"/>
  <rect x="853" y="265" width="14" height="20" rx="2" fill="#FF8C42" opacity="0.15"/>
  <text x="835" y="390" font-family="sans-serif" font-size="7" font-weight="600" fill="#6B7B6E" text-anchor="middle">STICK PACKS</text>

  <!-- Tub 6: Bulk powder -->
  <rect x="980" y="160" width="120" height="190" rx="10" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="990" y="145" width="100" height="25" rx="6" fill="#7CB518"/>
  <rect x="998" y="230" width="84" height="35" rx="4" fill="#7CB518" opacity="0.08"/>
  <text x="1040" y="250" font-family="sans-serif" font-size="8" font-weight="600" fill="#5A9A10" text-anchor="middle">DAILY</text>
  <text x="1040" y="262" font-family="sans-serif" font-size="6" fill="#6B7B6E" text-anchor="middle">Hydration Powder</text>

  <!-- Water splash across bottom -->
  <path d="M0 420 Q100 400 200 415 Q350 435 500 410 Q700 390 900 420 Q1050 440 1200 410" stroke="#7CB518" stroke-width="1.5" fill="none" opacity="0.15"/>
</svg>
