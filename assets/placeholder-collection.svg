<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <!-- Collection banner: Array of ingredient jars and pouches -->
  <rect width="1200" height="500" fill="#F0F5E8"/>

  <!-- Shelf surface -->
  <rect y="340" width="1200" height="160" fill="#E8E4DE" rx="0"/>
  <line x1="0" y1="340" x2="1200" y2="340" stroke="#D4DED0" stroke-width="2"/>

  <!-- Jar 1: Matcha -->
  <rect x="150" y="160" width="100" height="180" rx="8" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="160" y="140" width="80" height="30" rx="4" fill="#7CB518"/>
  <rect x="165" y="220" width="70" height="40" rx="3" fill="#7CB518" opacity="0.15"/>
  <text x="200" y="245" font-family="sans-serif" font-size="10" font-weight="600" fill="#5A9A10" text-anchor="middle">MATCHA</text>

  <!-- Jar 2: Turmeric -->
  <rect x="320" y="180" width="100" height="160" rx="8" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="330" y="160" width="80" height="30" rx="4" fill="#FF8C42"/>
  <rect x="335" y="240" width="70" height="40" rx="3" fill="#FF8C42" opacity="0.15"/>
  <text x="370" y="265" font-family="sans-serif" font-size="9" font-weight="600" fill="#D4732E" text-anchor="middle">TURMERIC</text>

  <!-- Pouch 3: Tea blend -->
  <path d="M500 200 Q530 170 560 200 L570 340 L490 340z" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="505" y="250" width="50" height="35" rx="3" fill="#5A9A10" opacity="0.15"/>
  <text x="530" y="272" font-family="sans-serif" font-size="9" font-weight="600" fill="#5A9A10" text-anchor="middle">CHAI</text>

  <!-- Jar 4: Superfood -->
  <rect x="650" y="170" width="110" height="170" rx="8" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="660" y="150" width="90" height="30" rx="4" fill="#C77DFF"/>
  <rect x="665" y="230" width="80" height="40" rx="3" fill="#C77DFF" opacity="0.15"/>
  <text x="705" y="255" font-family="sans-serif" font-size="8" font-weight="600" fill="#9B60CC" text-anchor="middle">ELDERBERRY</text>

  <!-- Jar 5: Ginger -->
  <rect x="840" y="190" width="90" height="150" rx="8" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="850" y="170" width="70" height="30" rx="4" fill="#FFE566"/>
  <rect x="855" y="245" width="60" height="35" rx="3" fill="#FFE566" opacity="0.2"/>
  <text x="885" y="267" font-family="sans-serif" font-size="9" font-weight="600" fill="#B8A030" text-anchor="middle">GINGER</text>

  <!-- Pouch 6: Lychee -->
  <path d="M990 210 Q1020 180 1050 210 L1060 340 L980 340z" fill="#F5F7F2" stroke="#D4DED0" stroke-width="1.5"/>
  <rect x="995" y="255" width="50" height="35" rx="3" fill="#FF9EBA" opacity="0.2"/>
  <text x="1020" y="277" font-family="sans-serif" font-size="9" font-weight="600" fill="#D4728E" text-anchor="middle">LYCHEE</text>

  <!-- Scattered ingredients -->
  <circle cx="270" cy="360" r="5" fill="#7CB518" opacity="0.4"/>
  <circle cx="620" cy="365" r="4" fill="#FF8C42" opacity="0.3"/>
  <circle cx="950" cy="355" r="3" fill="#FFE566" opacity="0.4"/>
</svg>
