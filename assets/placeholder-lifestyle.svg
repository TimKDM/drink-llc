<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Lifestyle: Active people — gym, trail, yoga — hydrating and recovering -->
  <rect width="800" height="600" fill="#F5F7F2"/>

  <!-- Three panels — different activity contexts -->

  <!-- Panel 1: Runner on trail -->
  <rect x="20" y="40" width="240" height="520" rx="12" fill="#E8F0DC"/>
  <!-- Trail path -->
  <path d="M20 480 Q80 440 140 460 Q200 480 260 450" stroke="#D4DED0" stroke-width="2" fill="none"/>
  <!-- Runner silhouette -->
  <circle cx="140" cy="200" r="22" fill="#1A1A1A" opacity="0.1"/>
  <path d="M125 225 Q130 260 128 320 L115 400" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round" opacity="0.08"/>
  <path d="M155 225 Q150 260 152 320 L165 400" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round" opacity="0.08"/>
  <!-- Water bottle in hand -->
  <rect x="168" y="240" width="14" height="35" rx="4" fill="#7CB518" opacity="0.3" stroke="#7CB518" stroke-width="1"/>
  <text x="140" y="480" font-family="sans-serif" font-size="10" font-weight="600" fill="#5A9A10" text-anchor="middle" letter-spacing="0.1em">RUN</text>

  <!-- Panel 2: Gym/lifting scene -->
  <rect x="280" y="40" width="240" height="520" rx="12" fill="#E8F0DC"/>
  <!-- Weight rack hint -->
  <rect x="310" y="360" width="180" height="8" rx="2" fill="#D4DED0"/>
  <rect x="320" y="330" width="12" height="38" rx="3" fill="#D4DED0"/>
  <rect x="458" y="330" width="12" height="38" rx="3" fill="#D4DED0"/>
  <!-- Person silhouette -->
  <circle cx="400" cy="200" r="24" fill="#1A1A1A" opacity="0.1"/>
  <path d="M383 228 Q390 270 388 340" stroke="#1A1A1A" stroke-width="9" stroke-linecap="round" opacity="0.08"/>
  <path d="M417 228 Q410 270 412 340" stroke="#1A1A1A" stroke-width="9" stroke-linecap="round" opacity="0.08"/>
  <!-- Shaker bottle -->
  <rect x="430" y="250" width="18" height="45" rx="5" fill="#FF8C42" opacity="0.25" stroke="#FF8C42" stroke-width="1"/>
  <rect x="434" y="244" width="10" height="10" rx="2" fill="#FF8C42" opacity="0.3"/>
  <text x="400" y="480" font-family="sans-serif" font-size="10" font-weight="600" fill="#5A9A10" text-anchor="middle" letter-spacing="0.1em">LIFT</text>

  <!-- Panel 3: Yoga/stretching recovery -->
  <rect x="540" y="40" width="240" height="520" rx="12" fill="#E8F0DC"/>
  <!-- Yoga mat hint -->
  <rect x="570" y="380" width="180" height="6" rx="3" fill="#7CB518" opacity="0.2"/>
  <!-- Person in stretch/recovery pose -->
  <circle cx="660" cy="220" r="22" fill="#1A1A1A" opacity="0.1"/>
  <path d="M645 245 Q650 280 640 340 Q635 370 620 380" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round" opacity="0.08"/>
  <path d="M675 245 Q670 280 680 340 Q685 370 700 380" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round" opacity="0.08"/>
  <!-- Water bottle beside -->
  <rect x="710" y="350" width="14" height="35" rx="4" fill="#7CB518" opacity="0.3" stroke="#7CB518" stroke-width="1"/>
  <text x="660" y="480" font-family="sans-serif" font-size="10" font-weight="600" fill="#5A9A10" text-anchor="middle" letter-spacing="0.1em">RECOVER</text>
</svg>
