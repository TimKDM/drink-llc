<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <!-- Product: Hydration mix container with clean label -->
  <rect width="600" height="600" fill="#F5F7F2"/>

  <!-- Soft circular background — water ripple -->
  <circle cx="300" cy="280" r="220" fill="none" stroke="#7CB518" stroke-width="1" opacity="0.06"/>
  <circle cx="300" cy="280" r="180" fill="#E8F0DC" opacity="0.5"/>
  <circle cx="300" cy="280" r="140" fill="none" stroke="#7CB518" stroke-width="1" opacity="0.08"/>

  <!-- Product bottle/container -->
  <rect x="215" y="100" width="170" height="380" rx="16" fill="#FFFFFF" stroke="#D4DED0" stroke-width="2"/>

  <!-- Cap -->
  <rect x="245" y="80" width="110" height="30" rx="8" fill="#7CB518"/>
  <rect x="260" y="75" width="80" height="12" rx="6" fill="#5A9A10"/>

  <!-- Label area -->
  <rect x="230" y="160" width="140" height="200" rx="8" fill="white"/>

  <!-- Brand mark -->
  <text x="300" y="195" font-family="sans-serif" font-size="22" font-weight="700" fill="#1A1A1A" text-anchor="middle" letter-spacing="0.08em">DRINK</text>

  <!-- Divider line -->
  <line x1="255" y1="205" x2="345" y2="205" stroke="#D4DED0" stroke-width="1"/>

  <!-- Product name -->
  <text x="300" y="235" font-family="sans-serif" font-size="12" font-weight="600" fill="#5A9A10" text-anchor="middle" letter-spacing="0.05em">HYDRATION</text>
  <text x="300" y="252" font-family="sans-serif" font-size="10" fill="#6B7B6E" text-anchor="middle">Electrolyte Mix</text>

  <!-- Flavor indicator -->
  <rect x="265" y="270" width="70" height="20" rx="10" fill="#7CB518" opacity="0.1" stroke="#7CB518" stroke-width="1"/>
  <text x="300" y="284" font-family="sans-serif" font-size="8" font-weight="500" fill="#5A9A10" text-anchor="middle">Citrus Burst</text>

  <!-- Key stats -->
  <g transform="translate(250, 310)">
    <text x="0" y="0" font-family="sans-serif" font-size="7" font-weight="600" fill="#1A1A1A">0g Sugar</text>
    <text x="0" y="14" font-family="sans-serif" font-size="7" font-weight="600" fill="#1A1A1A">6 Electrolytes</text>
    <text x="0" y="28" font-family="sans-serif" font-size="7" font-weight="600" fill="#1A1A1A">B Vitamins</text>
  </g>

  <!-- Water level inside bottle (behind label) -->
  <rect x="219" y="380" width="162" height="96" rx="14" fill="#7CB518" opacity="0.12"/>

  <!-- Water splash elements -->
  <path d="M180 350 L174 362 C172 367 176 370 180 365z" fill="#7CB518" opacity="0.2"/>
  <path d="M420 300 L426 312 C428 317 424 320 420 315z" fill="#7CB518" opacity="0.18"/>
  <circle cx="175" cy="300" r="3" fill="#7CB518" opacity="0.15"/>
  <circle cx="430" cy="260" r="2.5" fill="#7CB518" opacity="0.12"/>
  <circle cx="168" cy="380" r="4" fill="#7CB518" opacity="0.1"/>
  <circle cx="435" cy="340" r="3.5" fill="#7CB518" opacity="0.1"/>

  <!-- Certification row -->
  <text x="300" y="540" font-family="sans-serif" font-size="8" fill="#6B7B6E" text-anchor="middle" letter-spacing="0.15em">ORGANIC  ·  VEGAN  ·  NON-GMO</text>
</svg>
