<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Brand story: Recovery & hydration science -->
  <rect width="800" height="600" fill="#F5F7F2"/>

  <!-- Abstract water ripple background -->
  <circle cx="400" cy="300" r="260" fill="none" stroke="#7CB518" stroke-width="1" opacity="0.08"/>
  <circle cx="400" cy="300" r="210" fill="none" stroke="#7CB518" stroke-width="1" opacity="0.12"/>
  <circle cx="400" cy="300" r="160" fill="none" stroke="#7CB518" stroke-width="1.5" opacity="0.15"/>
  <circle cx="400" cy="300" r="110" fill="none" stroke="#7CB518" stroke-width="1.5" opacity="0.18"/>

  <!-- Central water drop — brand symbol -->
  <path d="M400 180 L440 260 C458 290 458 320 440 345 C420 372 380 372 360 345 C342 320 342 290 360 260z" fill="#7CB518" opacity="0.2"/>
  <path d="M400 200 L428 258 C442 282 442 305 428 324 C414 344 386 344 372 324 C358 305 358 282 372 258z" fill="#7CB518" opacity="0.15"/>

  <!-- Recovery icons around the drop -->
  <!-- Electrolytes -->
  <g transform="translate(200, 180)">
    <circle r="30" fill="#E8F0DC" stroke="#D4DED0" stroke-width="1.5"/>
    <text y="3" font-family="sans-serif" font-size="8" font-weight="600" fill="#5A9A10" text-anchor="middle" letter-spacing="0.05em">Na+ K+</text>
    <text y="14" font-family="sans-serif" font-size="6" fill="#6B7B6E" text-anchor="middle">Electrolytes</text>
  </g>

  <!-- Hydration -->
  <g transform="translate(600, 180)">
    <circle r="30" fill="#E8F0DC" stroke="#D4DED0" stroke-width="1.5"/>
    <path d="M-6 -8 L0 2 C2 6 -2 8 -6 4 C-10 0 -10 -4 -6 -8z" fill="#7CB518" opacity="0.6"/>
    <path d="M6 -8 L12 2 C14 6 10 8 6 4 C2 0 2 -4 6 -8z" fill="#7CB518" opacity="0.4"/>
    <text y="20" font-family="sans-serif" font-size="6" fill="#6B7B6E" text-anchor="middle">Hydration</text>
  </g>

  <!-- Recovery -->
  <g transform="translate(200, 420)">
    <circle r="30" fill="#E8F0DC" stroke="#D4DED0" stroke-width="1.5"/>
    <path d="M-8 0 L-3 0 L0 -8 L3 8 L6 0 L8 0" stroke="#7CB518" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text y="20" font-family="sans-serif" font-size="6" fill="#6B7B6E" text-anchor="middle">Recovery</text>
  </g>

  <!-- Natural -->
  <g transform="translate(600, 420)">
    <circle r="30" fill="#E8F0DC" stroke="#D4DED0" stroke-width="1.5"/>
    <path d="M-4 6 Q0 -8 4 6" stroke="#5A9A10" stroke-width="1.5" fill="#7CB518" opacity="0.3"/>
    <path d="M-2 4 Q0 -4 2 4" stroke="#5A9A10" stroke-width="1" fill="#7CB518" opacity="0.2"/>
    <text y="20" font-family="sans-serif" font-size="6" fill="#6B7B6E" text-anchor="middle">Natural</text>
  </g>

  <!-- Connecting lines -->
  <line x1="230" y1="180" x2="360" y2="260" stroke="#D4DED0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="570" y1="180" x2="440" y2="260" stroke="#D4DED0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="230" y1="420" x2="370" y2="340" stroke="#D4DED0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="570" y1="420" x2="430" y2="340" stroke="#D4DED0" stroke-width="1" stroke-dasharray="4 4"/>
</svg>
