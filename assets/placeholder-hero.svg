<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <!-- Hero: Matcha latte preparation scene -->
  <rect width="1600" height="900" fill="#E8F0DC"/>

  <!-- Marble countertop -->
  <rect y="520" width="1600" height="380" fill="#F0EDE8" rx="0"/>
  <line x1="200" y1="560" x2="350" y2="620" stroke="#E2DDD6" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="540" x2="800" y2="600" stroke="#E2DDD6" stroke-width="1.5" opacity="0.4"/>
  <line x1="1000" y1="550" x2="1200" y2="590" stroke="#E2DDD6" stroke-width="1.5" opacity="0.3"/>

  <!-- Matcha bowl (chawan) -->
  <ellipse cx="800" cy="520" rx="180" ry="40" fill="#D4DED0"/>
  <path d="M620 520 C620 520 640 700 800 700 C960 700 980 520 980 520" fill="#8B7355"/>
  <ellipse cx="800" cy="520" rx="170" ry="36" fill="#7CB518" opacity="0.9"/>

  <!-- Matcha foam swirl -->
  <path d="M720 510 Q760 490 800 510 Q840 530 880 510" stroke="#8BD420" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M740 520 Q770 505 800 520 Q830 535 860 520" stroke="#95DE2E" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Bamboo whisk (chasen) -->
  <rect x="1020" y="380" width="8" height="200" rx="4" fill="#C4A86B" transform="rotate(-15 1024 480)"/>
  <path d="M1010 380 Q1024 350 1038 380" stroke="#C4A86B" stroke-width="2" fill="none"/>
  <path d="M1014 380 Q1024 360 1034 380" stroke="#C4A86B" stroke-width="1.5" fill="none"/>

  <!-- Scattered matcha powder -->
  <circle cx="550" cy="560" r="3" fill="#7CB518" opacity="0.4"/>
  <circle cx="580" cy="575" r="2" fill="#7CB518" opacity="0.3"/>
  <circle cx="1050" cy="550" r="4" fill="#7CB518" opacity="0.35"/>
  <circle cx="1080" cy="570" r="2.5" fill="#7CB518" opacity="0.25"/>

  <!-- Loose tea leaves floating -->
  <path d="M300 200 Q310 190 320 200 Q310 210 300 200z" fill="#5A9A10" opacity="0.5" transform="rotate(30 310 200)"/>
  <path d="M1200 150 Q1210 140 1220 150 Q1210 160 1200 150z" fill="#5A9A10" opacity="0.4" transform="rotate(-20 1210 150)"/>
  <path d="M450 100 Q460 90 470 100 Q460 110 450 100z" fill="#7CB518" opacity="0.35" transform="rotate(45 460 100)"/>

  <!-- Soft light rays from top left -->
  <path d="M0 0 L400 300 L350 320 L0 50z" fill="white" opacity="0.08"/>
  <path d="M100 0 L500 280 L460 300 L100 40z" fill="white" opacity="0.05"/>
</svg>
