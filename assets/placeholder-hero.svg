<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <!-- Hero: Active person hydrating — post-workout recovery moment -->
  <rect width="1600" height="900" fill="#E8F0DC"/>

  <!-- Sky gradient -->
  <rect width="1600" height="500" fill="#F0F5E8"/>
  <rect y="400" width="1600" height="200" fill="url(#skyFade)"/>
  <defs>
    <linearGradient id="skyFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F5E8"/>
      <stop offset="100%" stop-color="#E8F0DC"/>
    </linearGradient>
  </defs>

  <!-- Outdoor environment — running trail hints -->
  <path d="M0 600 Q400 540 800 580 Q1200 620 1600 570 L1600 900 L0 900z" fill="#D4DED0" opacity="0.4"/>
  <path d="M0 650 Q400 610 800 640 Q1200 670 1600 630 L1600 900 L0 900z" fill="#C8D8C2" opacity="0.3"/>

  <!-- Person silhouette — athletic, drinking from bottle -->
  <circle cx="800" cy="260" r="45" fill="#1A1A1A" opacity="0.12"/>
  <path d="M760 310 Q780 340 780 420 L780 580 Q770 600 755 580 L755 420 Q755 370 740 340z" fill="#1A1A1A" opacity="0.1"/>
  <path d="M840 310 Q820 340 820 420 L820 580 Q830 600 845 580 L845 420 Q845 370 860 340z" fill="#1A1A1A" opacity="0.1"/>
  <!-- Arm raised with bottle -->
  <path d="M830 330 Q870 290 880 260 L885 260 Q875 295 838 340z" fill="#1A1A1A" opacity="0.1"/>

  <!-- Water bottle — the product hero -->
  <rect x="870" y="200" width="28" height="70" rx="8" fill="#F5F7F2" stroke="#7CB518" stroke-width="2"/>
  <rect x="875" y="192" width="18" height="14" rx="3" fill="#7CB518"/>
  <!-- Water inside -->
  <rect x="874" y="230" width="20" height="36" rx="6" fill="#7CB518" opacity="0.25"/>

  <!-- Water splash/droplets around bottle -->
  <path d="M862 220 L858 228 C856 232 860 234 864 230z" fill="#7CB518" opacity="0.3"/>
  <path d="M906 215 L910 224 C912 228 908 230 904 226z" fill="#7CB518" opacity="0.25"/>
  <circle cx="855" cy="240" r="3" fill="#7CB518" opacity="0.2"/>
  <circle cx="912" cy="235" r="2.5" fill="#7CB518" opacity="0.2"/>
  <circle cx="860" cy="255" r="2" fill="#7CB518" opacity="0.15"/>

  <!-- Electrolyte molecules / recovery elements floating -->
  <circle cx="400" cy="200" r="4" fill="#7CB518" opacity="0.2"/>
  <circle cx="410" cy="195" r="3" fill="#FF8C42" opacity="0.2"/>
  <line x1="400" y1="200" x2="410" y2="195" stroke="#7CB518" stroke-width="1" opacity="0.15"/>

  <circle cx="1150" cy="250" r="5" fill="#7CB518" opacity="0.15"/>
  <circle cx="1165" cy="245" r="3.5" fill="#FFE566" opacity="0.2"/>
  <line x1="1150" y1="250" x2="1165" y2="245" stroke="#7CB518" stroke-width="1" opacity="0.12"/>

  <!-- Sunlight rays -->
  <path d="M1400 0 L1600 0 L1600 200z" fill="white" opacity="0.06"/>
  <path d="M1200 0 L1500 0 L1600 150 L1300 0z" fill="white" opacity="0.04"/>
</svg>
