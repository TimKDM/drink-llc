name: Drink LLC Brand & Code Audit
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gemini AI Review
        uses: google-gemini/github-action@v1.1.0
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          model: 'gemini-2.0-flash'
          instructions: |
            You are the Drink LLC Brand Guardian. 
            Review this Pull Request against the following strict Manifest rules:
            
            1. BRAND VOICE: 
               - Deadpan confident. Short sentences. 
               - NO exclamation points. 
               - NO "wellness jargon" (e.g., optimize, elevate, fuel, journey, potential).
               
            2. PRODUCT NAMING: 
               - Must follow the convention: [Flavor] Drink (e.g., Mango Drink, Matcha Drink). 
               - FLAG any reordering or lowercase "drink".
               
            3. LOGO/SVG COMPLIANCE: 
               - Logo must be the custom SVG wordmark: DRiNK (all caps except lowercase 'i').
               - Check for fill-rule="evenodd" on D and R paths for inner cutouts.
               - Ensure fonts are base64 embedded to avoid rendering failures in cairosvg.
               - Check background: Must be #0D0D0D with flavor radial glow (opacity 0.07 max).
               
            4. TONE & STYLE: 
               - Follow "Tim-style" brevity: Max 15 words per sentence. 
               - Use bolding for scanability. 
               - Human-to-human, no corporate padding.
               
            5. LABEL HIERARCHY (Locked Option C): 
               - Flavor name small + accent color -> "HYDRATION" small + muted grey -> DRiNK dominant + white.
